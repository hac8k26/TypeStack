    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --border-hover: #cbd5e1;
            --radius: 16px;
            --ring: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #07080f; color: #e2e8f0; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        #bg-canvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        nav, .grid, #toast { position: relative; z-index: 1; }

        /* Frosted Sticky Header */
        nav {
            position: sticky; top: 0; z-index: 50;
            background: rgba(7,8,15,0.6);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 16px 5%; display: flex; justify-content: space-between; align-items: center;
        }
        .brand { font-weight: 600; font-size: 15px; letter-spacing: -0.5px; text-decoration: none; color: #fff; }
        .controls { display: none; }
        .nav-link {
            padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12);
            font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.6);
            text-decoration: none; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 5px; font-family: 'Inter', sans-serif;
            background: rgba(255,255,255,0.05);
        }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }

        input[type="text"] {
            padding: 10px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06); outline: none; font-size: 14px;
            width: 250px; color: #fff; transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.3); }
        input[type="text"]:focus { border-color: rgba(99,102,241,0.6); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }

        .btn {
            padding: 8px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06); cursor: pointer; font-size: 12px; font-weight: 500;
            color: rgba(255,255,255,0.75); transition: all 0.2s; text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px; font-family: 'Inter', sans-serif;
        }
        .btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); color: #fff; }
        .btn-primary { background: #fff; color: #0f172a; border-color: #fff; }
        .btn-primary:hover { background: #e2e8f0; border-color: #e2e8f0; }

        /* Floating search bar */
        .float-bar {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; align-items: center; gap: 10px;
            background: rgba(7,8,15,0.9);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 100px;
            padding: 10px 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .float-bar svg { color: rgba(255,255,255,0.3); flex-shrink: 0; }
        .float-bar input { flex: 1; min-width: 140px; background: transparent; border: none; outline: none; font-size: 13px; color: #fff; font-family: 'Inter', sans-serif; }
        .float-bar input::placeholder { color: rgba(255,255,255,0.3); }
        .bar-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
        .pill-count { font-size: 11px; color: rgba(255,255,255,0.3); white-space: nowrap; padding: 3px 10px; border-radius: 100px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); }
        .pill-count strong { color: rgba(255,255,255,0.7); }

        /* Size selector */
        .size-btns { display: flex; gap: 4px; }
        .size-btn {
            padding: 3px 8px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.12);
            background: transparent; cursor: pointer; font-size: 10px; font-weight: 500;
            color: rgba(255,255,255,0.4); transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .size-btn.active { background: #fff; color: #0f172a; border-color: #fff; }
        @media(max-width: 600px) { .float-bar { max-width: calc(100vw - 32px); } .float-bar input { min-width: 80px; } }

        /* Icon Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            padding: 32px 5%;
            max-width: 1600px;
            margin: 0 auto;
        }

        .icon-card {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 20px 12px 14px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            cursor: pointer; transition: all 0.2s ease; position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .icon-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07);
        }
        .icon-card.copied { border-color: rgba(99,102,241,0.6); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }

        .icon-wrap { display: flex; align-items: center; justify-content: center; color: #e2e8f0; }
        .icon-name {
            font-size: 10px; color: rgba(255,255,255,0.4); text-align: center;
            line-height: 1.4; word-break: break-all; font-weight: 500;
        }

        /* Copy overlay */
        .copy-hint {
            position: absolute; inset: 0; border-radius: 12px;
            background: rgba(15,23,42,0.9); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 600; opacity: 0;
            transition: opacity 0.15s; pointer-events: none;
        }
        .icon-card:hover .copy-hint { opacity: 1; }

        /* Empty state */
        .empty {
            grid-column: 1 / -1; text-align: center;
            padding: 80px 20px; color: rgba(255,255,255,0.3);
        }
        .empty svg { margin-bottom: 16px; opacity: 0.3; }
        .empty p { font-size: 14px; }

        /* Toast */
        #toast {
            position: fixed; bottom: 24px; right: 24px;
            background: rgba(15,23,42,0.95); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px 24px; border-radius: 8px;
            font-size: 14px; font-weight: 500;
            opacity: 0; transform: translateY(10px);
            transition: all 0.3s ease; pointer-events: none; z-index: 100;
        }
        .toast-visible { opacity: 1 !important; transform: translateY(0) !important; }

        @media (max-width: 600px) {
            .controls input[type="text"] { width: 130px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; padding: 16px 4%; }
            .icon-card { padding: 14px 8px 10px; }
        }
    
        .nav-github-mobile{display:none;}
        @media(min-width:641px){
          .nav-right{display:flex !important;}
        }
        @media(max-width:640px){
          .nav-right{display:none !important;}
          .nav-github-mobile{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.75);text-decoration:none;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;transition:all 0.2s;}
        }
    </style>
</head>

    <script type="module">
        import { createElement, icons } from 'https://cdn.jsdelivr.net/npm/lucide@0.577.0/+esm';

        let currentSize = 24;
        let allIconNames = Object.keys(icons).sort();

        const grid = document.getElementById('grid');
        const toast = document.getElementById('toast');
        const visibleCount = document.getElementById('visibleCount');

        function toKebab(name) {
            return name.replace(/([A-Z])/g, (m, l, i) => (i === 0 ? l.toLowerCase() : '-' + l.toLowerCase()));
        }

        function buildSvgString(name, size) {
            const el = createElement(icons[name], { width: size, height: size });
            return el.outerHTML;
        }

        function renderIcons(names) {
            grid.innerHTML = '';
            if (names.length === 0) {
                grid.innerHTML = `<div class="empty">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <p>No icons match your search.</p>
                </div>`;
                visibleCount.textContent = '0';
                return;
            }

            visibleCount.textContent = names.length;

            names.forEach(name => {
                const kebab = toKebab(name);
                const card = document.createElement('div');
                card.className = 'icon-card';
                card.title = `Click to copy ${kebab}`;

                const iconEl = createElement(icons[name], { width: currentSize, height: currentSize });

                const wrap = document.createElement('div');
                wrap.className = 'icon-wrap';
                wrap.appendChild(iconEl);

                const label = document.createElement('div');
                label.className = 'icon-name';
                label.textContent = kebab;

                const hint = document.createElement('div');
                hint.className = 'copy-hint';
                hint.textContent = 'Copy SVG';

                card.appendChild(wrap);
                card.appendChild(label);
                card.appendChild(hint);

                card.addEventListener('click', () => {
                    const svg = buildSvgString(name, currentSize);
                    navigator.clipboard.writeText(svg).then(() => {
                        card.classList.add('copied');
                        setTimeout(() => card.classList.remove('copied'), 1200);
                        showToast();
                    });
                });

                grid.appendChild(card);
            });
        }

        function showToast() {
            toast.classList.add('toast-visible');
            setTimeout(() => toast.classList.remove('toast-visible'), 2000);
        }

        window.filterIcons = function(query) {
            const q = query.toLowerCase().trim();
            const filtered = q
                ? allIconNames.filter(n => toKebab(n).includes(q) || n.toLowerCase().includes(q))
                : allIconNames;
            renderIcons(filtered);
        };

        window.setSize = function(size) {
            currentSize = size;
            document.querySelectorAll('.size-btn').forEach(b => {
                b.classList.toggle('active', parseInt(b.dataset.size) === size);
            });
            const q = document.getElementById('searchInput').value;
            window.filterIcons(q);
        };

        renderIcons(allIconNames);
    </script>

    <script>
    (function(){
      const canvas=document.createElement('canvas');
      canvas.style.cssText='position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
      document.body.appendChild(canvas);
      const ctx=canvas.getContext('2d');
      function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
      window.addEventListener('resize',resize);resize();
      let sparks=[];
      function ease(t){return t*(2-t);}
      function loop(ts){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        sparks=sparks.filter(s=>{
          const p=(ts-s.t)/500;if(p>=1)return false;
          const e=ease(p),dist=e*40,len=12*(1-e);
          const x1=s.x+dist*Math.cos(s.a),y1=s.y+dist*Math.sin(s.a);
          const x2=s.x+(dist+len)*Math.cos(s.a),y2=s.y+(dist+len)*Math.sin(s.a);
          ctx.globalAlpha=1-e;ctx.strokeStyle='#fff';ctx.lineWidth=2;
          ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
          return true;
        });
        ctx.globalAlpha=1;requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
      document.addEventListener('click',e=>{
        const now=performance.now();
        for(let i=0;i<8;i++) sparks.push({x:e.clientX,y:e.clientY,a:(2*Math.PI*i)/8,t:now});
      });
    })();
    </script>
