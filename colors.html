<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeStack — Color Palette</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #07080f; color: #e2e8f0; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        #bg-canvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        nav, .content, #toast { position: relative; z-index: 1; }
        nav {
            position: sticky; top: 0; z-index: 50;
            background: rgba(7,8,15,0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 16px 5%; display: flex; justify-content: space-between; align-items: center;
        }
        .brand { font-weight: 600; font-size: 15px; letter-spacing: -0.5px; text-decoration: none; color: #fff; }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .nav-link {
            padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12);
            font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.6);
            text-decoration: none; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.05); font-family: 'Inter', sans-serif;
        }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        input[type="text"] {
            padding: 10px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06); outline: none; font-size: 14px;
            width: 220px; color: #fff; transition: all 0.2s ease; font-family: 'Inter', sans-serif;
        }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.3); }
        input[type="text"]:focus { border-color: rgba(99,102,241,0.6); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        .content { max-width: 1600px; margin: 0 auto; padding: 40px 5% 80px; }
        .section-label {
            font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
            color: rgba(255,255,255,0.2); margin: 40px 0 16px;
        }
        .section-label:first-child { margin-top: 0; }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px;
        }
        .card {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; overflow: hidden; cursor: pointer;
            transition: all 0.2s ease; box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .card:hover {
            transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.07);
        }
        .card.copied { border-color: rgba(99,102,241,0.6); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        .swatch { height: 80px; width: 100%; display: block; }
        .card-body { padding: 12px 14px; }
        .color-name { font-size: 12px; font-weight: 600; color: #fff; letter-spacing: -0.2px; margin-bottom: 3px; }
        .color-hex { font-size: 11px; color: rgba(255,255,255,0.35); font-family: 'JetBrains Mono', 'Fira Code', monospace; }
        .color-rgb { font-size: 10px; color: rgba(255,255,255,0.18); margin-top: 3px; }
        .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.25); font-size: 14px; }
        #toast {
            position: fixed; bottom: 24px; right: 24px;
            background: rgba(15,23,42,0.95); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 12px 24px; border-radius: 8px;
            font-size: 14px; font-weight: 500; opacity: 0; transform: translateY(10px);
            transition: all 0.3s ease; pointer-events: none; z-index: 100;
        }
        .toast-visible { opacity: 1 !important; transform: translateY(0) !important; }
        .stats-float {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            z-index: 99; display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 14px; border-radius: 100px;
            background: rgba(10,10,18,0.85); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            font-size: 11px; color: rgba(255,255,255,0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); white-space: nowrap;
        }
        .stats-float strong { color: #fff; font-weight: 600; }
        .stats-float .sep { color: rgba(255,255,255,0.15); }
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
            .content { padding: 24px 4% 60px; }
            nav input[type="text"] { width: 130px; }
        }
    
        .nav-github-mobile{display:none;}
        @media(min-width:641px){
          .nav-right{display:flex !important;}
        }
        @media(max-width:640px){
          .nav-right{display:none !important;}
          .nav-github-mobile{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.75);text-decoration:none;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;transition:all 0.2s;}
        }
    </style>
</head>

    <script>
    const palette = [
        // Brand
        { name: 'Indigo', hex: '#818cf8', group: 'Brand' },
        { name: 'Purple', hex: '#c084fc', group: 'Brand' },
        { name: 'Violet', hex: '#a78bfa', group: 'Brand' },
        { name: 'Deep BG', hex: '#07080f', group: 'Brand' },
        { name: 'Surface', hex: '#0d0e1a', group: 'Brand' },
        { name: 'Card BG', hex: '#111827', group: 'Brand' },
        // Slate
        { name: 'Slate 50', hex: '#f8fafc', group: 'Slate' },
        { name: 'Slate 100', hex: '#f1f5f9', group: 'Slate' },
        { name: 'Slate 200', hex: '#e2e8f0', group: 'Slate' },
        { name: 'Slate 300', hex: '#cbd5e1', group: 'Slate' },
        { name: 'Slate 400', hex: '#94a3b8', group: 'Slate' },
        { name: 'Slate 500', hex: '#64748b', group: 'Slate' },
        { name: 'Slate 600', hex: '#475569', group: 'Slate' },
        { name: 'Slate 700', hex: '#334155', group: 'Slate' },
        { name: 'Slate 800', hex: '#1e293b', group: 'Slate' },
        { name: 'Slate 900', hex: '#0f172a', group: 'Slate' },
        // Blue
        { name: 'Blue 400', hex: '#60a5fa', group: 'Blue' },
        { name: 'Blue 500', hex: '#3b82f6', group: 'Blue' },
        { name: 'Blue 600', hex: '#2563eb', group: 'Blue' },
        { name: 'Sky 400', hex: '#38bdf8', group: 'Blue' },
        { name: 'Cyan 400', hex: '#22d3ee', group: 'Blue' },
        { name: 'Indigo 400', hex: '#818cf8', group: 'Blue' },
        // Purple
        { name: 'Violet 400', hex: '#a78bfa', group: 'Purple' },
        { name: 'Violet 500', hex: '#8b5cf6', group: 'Purple' },
        { name: 'Purple 400', hex: '#c084fc', group: 'Purple' },
        { name: 'Purple 500', hex: '#a855f7', group: 'Purple' },
        { name: 'Fuchsia 400', hex: '#e879f9', group: 'Purple' },
        { name: 'Pink 400', hex: '#f472b6', group: 'Purple' },
        // Green
        { name: 'Teal 400', hex: '#2dd4bf', group: 'Green' },
        { name: 'Emerald 400', hex: '#34d399', group: 'Green' },
        { name: 'Green 400', hex: '#4ade80', group: 'Green' },
        { name: 'Lime 400', hex: '#a3e635', group: 'Green' },
        // Warm
        { name: 'Yellow 400', hex: '#facc15', group: 'Warm' },
        { name: 'Amber 400', hex: '#fbbf24', group: 'Warm' },
        { name: 'Orange 400', hex: '#fb923c', group: 'Warm' },
        { name: 'Red 400', hex: '#f87171', group: 'Warm' },
        { name: 'Rose 400', hex: '#fb7185', group: 'Warm' },
        // Mono
        { name: 'White', hex: '#ffffff', group: 'Mono' },
        { name: 'Gray 100', hex: '#f3f4f6', group: 'Mono' },
        { name: 'Gray 300', hex: '#d1d5db', group: 'Mono' },
        { name: 'Gray 500', hex: '#6b7280', group: 'Mono' },
        { name: 'Gray 700', hex: '#374151', group: 'Mono' },
        { name: 'Gray 900', hex: '#111827', group: 'Mono' },
        { name: 'Black', hex: '#000000', group: 'Mono' },
    ];

    const content = document.getElementById('content');
    const toast = document.getElementById('toast');
    const visibleCount = document.getElementById('visibleCount');
    let toastTimer;

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return `rgb(${r}, ${g}, ${b})`;
    }

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('toast-visible');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('toast-visible'), 2000);
    }

    function renderColors(list) {
        content.innerHTML = '';
        visibleCount.textContent = list.length;
        if (!list.length) {
            content.innerHTML = '<div class="empty">No colors match your search.</div>';
            return;
        }
        const groups = [...new Set(list.map(c => c.group))];
        groups.forEach(group => {
            const label = document.createElement('div');
            label.className = 'section-label';
            label.textContent = group;
            content.appendChild(label);
            const grid = document.createElement('div');
            grid.className = 'grid';
            list.filter(c => c.group === group).forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="swatch" style="background:${c.hex}"></div>
                    <div class="card-body">
                        <div class="color-name">${c.name}</div>
                        <div class="color-hex">${c.hex}</div>
                        <div class="color-rgb">${hexToRgb(c.hex)}</div>
                    </div>`;
                card.addEventListener('click', () => {
                    navigator.clipboard.writeText(c.hex).then(() => {
                        card.classList.add('copied');
                        setTimeout(() => card.classList.remove('copied'), 1200);
                        showToast(`Copied ${c.hex}`);
                    });
                });
                grid.appendChild(card);
            });
            content.appendChild(grid);
        });
    }

    window.filterColors = function(q) {
        q = q.toLowerCase().trim();
        renderColors(q ? palette.filter(c => c.name.toLowerCase().includes(q) || c.hex.toLowerCase().includes(q) || c.group.toLowerCase().includes(q)) : palette);
    };

    renderColors(palette);
    </script>

    <script>
    (function(){
      const canvas=document.createElement('canvas');
      canvas.style.cssText='position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
      document.body.appendChild(canvas);
      const ctx=canvas.getContext('2d');
      function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
      window.addEventListener('resize',resize);resize();
      let sparks=[];
      function ease(t){return t*(2-t);}
      function loop(ts){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        sparks=sparks.filter(s=>{
          const p=(ts-s.t)/500;if(p>=1)return false;
          const e=ease(p),dist=e*40,len=12*(1-e);
          const x1=s.x+dist*Math.cos(s.a),y1=s.y+dist*Math.sin(s.a);
          const x2=s.x+(dist+len)*Math.cos(s.a),y2=s.y+(dist+len)*Math.sin(s.a);
          ctx.globalAlpha=1-e;ctx.strokeStyle='#fff';ctx.lineWidth=2;
          ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
          return true;
        });
        ctx.globalAlpha=1;requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
      document.addEventListener('click',e=>{
        const now=performance.now();
        for(let i=0;i<8;i++) sparks.push({x:e.clientX,y:e.clientY,a:(2*Math.PI*i)/8,t:now});
      });
    })();
    </script>

    r.className="click-ripple";
    const size=60;
    r.style.cssText="width:"+size+"px;height:"+size+"px;left:"+(e.clientX-size/2)+"px;top:"+(e.clientY-size/2)+"px;background:radial-gradient(circle,rgba(129,140,248,0.55) 0%,rgba(192,132,252,0.2) 50%,transparent 70%);";
    document.body.appendChild(r);
    setTimeout(()=>r.remove(),500);
  });
})();
</script>
</body>
</html>
