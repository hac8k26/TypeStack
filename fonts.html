    <style>
        :root {
            /* Tailwind-inspired Slate color palette */
            --bg: #f8fafc; 
            --card-bg: #ffffff;
            --text-main: #0f172a; 
            --text-muted: #64748b; 
            --border: #e2e8f0; 
            --border-hover: #cbd5e1;
            --radius: 16px;
            --ring: #3b82f6; /* Blue accent for focus */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: #07080f; 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased;
        }

        #bg-canvas {
            position: fixed; inset: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        nav, .grid, #toast {
            position: relative; z-index: 1;
        }

        /* --- Frosted Sticky Header --- */
        nav {
            position: sticky; 
            top: 0; 
            z-index: 50;
            background: rgba(7,8,15,0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 16px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        .brand { font-weight: 600; font-size: 15px; letter-spacing: -0.5px; text-decoration: none; color: #fff; }

        .controls { display: flex; gap: 16px; align-items: center; }

        input[type="text"] {
            padding: 10px 16px; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06); 
            outline: none; 
            font-size: 14px;
            width: 250px;
            color: #fff;
            transition: all 0.2s ease;
        }

        input[type="text"]::placeholder { color: rgba(255,255,255,0.3); }

        input[type="text"]:focus { 
            border-color: rgba(99,102,241,0.6); 
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15); 
        }

        /* --- Card Grid Layout --- */
        .grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px; 
            padding: 40px 5%; 
            max-width: 1600px; 
            margin: 0 auto;
        }

        .card {
            background: rgba(255,255,255,0.04); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: var(--radius);
            padding: 24px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2); 
            transition: all 0.2s ease;
        }

        .card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.3); 
            border-color: rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07);
        }

        .card-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .badge {
            background: rgba(255,255,255,0.07); 
            color: rgba(255,255,255,0.5); 
            padding: 4px 10px; 
            border-radius: 6px;
            font-size: 11px; 
            font-weight: 600; 
            letter-spacing: 0.5px;
        }

        .specimen { 
            font-size: 32px; 
            outline: none; 
            line-height: 1.3; 
            flex-grow: 1; 
            word-break: break-word;
            color: #fff;
        }

        /* --- Buttons --- */
        .actions { 
            display: flex; 
            gap: 10px; 
            margin-top: auto; 
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .btn {
            padding: 8px 14px; 
            border-radius: 6px; 
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06); 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: 500;
            color: rgba(255,255,255,0.75); 
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px;
            font-family: 'Inter', sans-serif;
        }

        .btn:hover { 
            background: rgba(255,255,255,0.12); 
            border-color: rgba(255,255,255,0.25);
            color: #fff;
        }

        .btn-primary { 
            background: #fff; 
            color: #0f172a; 
            border-color: #fff; 
        }

        .btn-primary:hover { 
            background: #e2e8f0; 
            border-color: #e2e8f0; 
        }

        /* --- Toast Notification --- */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(15,23,42,0.95);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 100;
        }

        .toast-visible {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        /* Nav links */
        .nav-link {
            padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12);
            font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.6);
            text-decoration: none; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.05);
        }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        .nav-right { display: flex; align-items: center; gap: 10px; }

        @media (max-width: 640px) {
            .nav-right input[type="text"] { width: 140px; }
            .grid { grid-template-columns: 1fr; gap: 14px; padding: 20px 4%; }
            .specimen { font-size: 26px; }
        }
    
        .nav-github-mobile{display:none;}
        @media(min-width:641px){
          .nav-right{display:flex !important;}
        }
        @media(max-width:640px){
          .nav-right{display:none !important;}
          .nav-github-mobile{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.75);text-decoration:none;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;transition:all 0.2s;}
        }
    </style>
</head>

        function acceptConsent() {
            localStorage.setItem('ts_consent', '1');
            const overlay = document.getElementById('consent-overlay');

            setTimeout(() => { overlay.remove(); }, 400);

        function ignoreConsent() {
            const overlay = document.getElementById('consent-overlay');
            overlay.style.opacity = '0'; overlay.style.transform = 'translateX(-50%) translateY(20px)';
            setTimeout(() => overlay.remove(), 400);
        }

        const loadedFonts = new Set();
        const grid = document.getElementById('grid');
        const toast = document.getElementById('toast');

        // Lazy load font when card enters viewport
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target;
                    const font = card.dataset.font;
                    if (!loadedFonts.has(font)) {
                        loadedFonts.add(font);
                        const link = document.createElement('link');
                        link.rel = 'stylesheet';
                        link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(font).replace(/%20/g,'+').replace(/%3A/g,':')}:wght@400;600&display=swap`;
                        document.head.appendChild(link);
                    }
                    observer.unobserve(card);
                }
            });
        }, { rootMargin: '200px' });

        fonts.forEach(font => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.font = font;
            card.innerHTML = `
                <div class="card-header">
                    <span class="badge">${font}</span>
                </div>
                <div class="specimen" style="font-family: '${font}', sans-serif;" contenteditable="true">

                    <button class="btn btn-primary" onclick="copyCode('${font}')">Copy CSS</button>

        function updateText(val) {

        function copyCode(fontName) {
            const code = `@import url('https://fonts.googleapis.com/css2?family=${fontName.replace(/ /g, '+')}:wght@400;600&display=swap');\n\nfont-family: '${fontName}', sans-serif;`;
            navigator.clipboard.writeText(code).then(() => showToast());
        }

        async function downloadFont(fontName) {
            const family = fontName.replace(/ /g, '+');
            const cssUrl = `https://fonts.googleapis.com/css2?family=${family}:wght@400;600&display=swap`;
            try {
                const cssRes = await fetch(cssUrl);
                const css = await cssRes.text();
                const urls = [...css.matchAll(/url\((https:\/\/[^)]+)\)/g)].map(m => m[1]);
                for (const url of urls) {
                    const res = await fetch(url);
                    const blob = await res.blob();
                    const ext = url.split('.').pop().split('?')[0];
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `${fontName.replace(/ /g, '_')}.${ext}`;
                    a.click();
                    URL.revokeObjectURL(a.href);
                }
            } catch (e) {
                alert('Download failed. Try downloading from fonts.google.com directly.');
            }
        }

        async function downloadOTF(fontName) {
            // Request OTF via a CSS API user-agent trick, then fetch & blob-download
            const family = fontName.replace(/ /g, '+');
            // Use a proxy to get OTF urls — Google Fonts returns OTF when requested with an older UA
            const cssUrl = `https://fonts.googleapis.com/css?family=${family}:400,600`;
            try {
                // Fetch via a CORS proxy that spoofs the UA to get OTF urls
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(cssUrl)}`;
                const cssRes = await fetch(proxyUrl);
                const css = await cssRes.text();
                const urls = [...css.matchAll(/url\((https:\/\/[^)]+)\)/g)].map(m => m[1]);
                if (!urls.length) throw new Error('No font URLs found');
                // Download each variant
                for (const url of urls) {
                    const res = await fetch(url);
                    const blob = await res.blob();
                    const ext = url.split('.').pop().split('?')[0] || 'otf';
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `${fontName.replace(/ /g, '_')}.${ext}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(a.href);
                }
            } catch (e) {
                // Fallback: direct download via blob from the standard CSS2 API
                try {
                    const cssRes2 = await fetch(`https://fonts.googleapis.com/css2?family=${family}:wght@400;600&display=swap`);
                    const css2 = await cssRes2.text();
                    const urls2 = [...css2.matchAll(/url\((https:\/\/[^)]+)\)/g)].map(m => m[1]);
                    for (const url of urls2) {
                        const res = await fetch(url);
                        const blob = await res.blob();
                        const ext = url.split('.').pop().split('?')[0] || 'woff2';
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = `${fontName.replace(/ /g, '_')}.${ext}`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(a.href);
                    }
                } catch (e2) {
                    alert('Download failed. Try downloading from fonts.google.com directly.');
                }
            }
        }

        function showToast() {
            toast.classList.add('toast-visible');
            setTimeout(() => toast.classList.remove('toast-visible'), 2500);
        }
    </script>

    <script>
        (function(){
            const canvas = document.getElementById('bg-canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (!gl) return;
            let mouse = {x:0.5,y:0.5}, sm = {x:0.5,y:0.5};
            function resize(){ const d=Math.min(devicePixelRatio,2); canvas.width=innerWidth*d; canvas.height=innerHeight*d; gl.viewport(0,0,canvas.width,canvas.height); }
            window.addEventListener('resize', resize);
            window.addEventListener('mousemove', e=>{ mouse.x=e.clientX/innerWidth; mouse.y=e.clientY/innerHeight; });
            const vs=`attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
            const fs=`precision highp float;uniform float t;uniform vec2 r;uniform vec2 m;
            float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
            float ray(vec2 src,vec2 dir,vec2 c,float a,float b,float s){vec2 d=c-src;vec2 dn=normalize(d);float ca=dot(dn,dir);float sp=pow(max(ca,0.),6.);float dist=length(d);float f=clamp((r.x*2.-dist)/(r.x*2.),0.,1.);float pulse=.7+.3*sin(t*s+ca*a);float base=clamp(.45+.15*sin(ca*a+t*s)+.3+.2*cos(-ca*b+t*s),0.,1.);return base*f*sp*pulse;}
            void main(){vec2 c=vec2(gl_FragCoord.x,r.y-gl_FragCoord.y);vec2 src=vec2(r.x*(.5+(m.x-.5)*.12),-r.y*.04);vec2 dir=normalize(vec2((m.x-.5)*.18,1.));float rays=ray(src,dir,c,36.22,21.11,1.5)*.55+ray(src,dir,c,22.4,18.02,1.1)*.4;vec3 col=rays*vec3(.55,.52,1.);col*=.15+(1.-c.y/r.y)*.85;float star=0.;for(int i=0;i<3;i++){vec2 cell=floor(c/(80.+float(i)*40.));vec2 h2=vec2(h(cell+float(i)*7.3),h(cell+float(i)*13.7));vec2 sp=(cell+h2)*(80.+float(i)*40.);float d=length(c-sp);float tw=.5+.5*sin(t*(1.5+h2.x*3.)+h2.y*6.28);star+=tw*smoothstep(1.8,0.,d)*(.3+h2.x*.7);}col+=star*vec3(.85,.88,1.)*.6;gl_FragColor=vec4(col,rays*.92+star*.5);}`;
            function sh(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
            const prog=gl.createProgram();gl.attachShader(prog,sh(gl.VERTEX_SHADER,vs));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,fs));gl.linkProgram(prog);gl.useProgram(prog);
            const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
            const loc=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
            gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE);
            const uT=gl.getUniformLocation(prog,'t'),uR=gl.getUniformLocation(prog,'r'),uM=gl.getUniformLocation(prog,'m');
            resize();
            function loop(ts){const s=.93;sm.x=sm.x*s+mouse.x*(1-s);sm.y=sm.y*s+mouse.y*(1-s);gl.uniform1f(uT,ts*.001);gl.uniform2f(uR,canvas.width,canvas.height);gl.uniform2f(uM,sm.x,sm.y);gl.clear(gl.COLOR_BUFFER_BIT);gl.drawArrays(gl.TRIANGLES,0,3);requestAnimationFrame(loop);}
            requestAnimationFrame(loop);
        })();
    </script>

    <script>
    (function(){
      const canvas=document.createElement('canvas');
      canvas.style.cssText='position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
      document.body.appendChild(canvas);
      const ctx=canvas.getContext('2d');
      function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
      window.addEventListener('resize',resize);resize();
      let sparks=[];
      function ease(t){return t*(2-t);}
      function loop(ts){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        sparks=sparks.filter(s=>{
          const p=(ts-s.t)/500;if(p>=1)return false;
          const e=ease(p),dist=e*40,len=12*(1-e);
          const x1=s.x+dist*Math.cos(s.a),y1=s.y+dist*Math.sin(s.a);
          const x2=s.x+(dist+len)*Math.cos(s.a),y2=s.y+(dist+len)*Math.sin(s.a);
          ctx.globalAlpha=1-e;ctx.strokeStyle='#fff';ctx.lineWidth=2;
          ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
          return true;
        });
        ctx.globalAlpha=1;requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
      document.addEventListener('click',e=>{
        const now=performance.now();
        for(let i=0;i<8;i++) sparks.push({x:e.clientX,y:e.clientY,a:(2*Math.PI*i)/8,t:now});
      });
    })();
    </script>
