<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeStack — Motion</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#07080f;color:#e2e8f0;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
        #bg-canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
        nav,.content,#toast{position:relative;z-index:1;}
        nav{position:sticky;top:0;z-index:50;background:rgba(7,8,15,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.07);padding:16px 5%;display:flex;justify-content:space-between;align-items:center;}
        .brand{font-weight:600;font-size:15px;letter-spacing:-0.5px;text-decoration:none;color:#fff;}
        .nav-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
        .nav-link{padding:8px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.12);font-size:12px;font-weight:500;color:rgba(255,255,255,0.6);text-decoration:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.05);font-family:'Inter',sans-serif;}
        .nav-link:hover{color:#fff;background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);}
        .nav-link.active{color:#fff;background:rgba(129,140,248,0.15);border-color:rgba(129,140,248,0.35);}
        .content{max-width:1400px;margin:0 auto;padding:60px 5% 180px;}
        .hero{text-align:center;margin-bottom:48px;}
        .hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:100px;padding:5px 14px 5px 10px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.45);letter-spacing:0.3px;margin-bottom:20px;}
        .hero h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(36px,6vw,64px);font-weight:800;letter-spacing:-2.5px;line-height:1.05;color:#fff;margin-bottom:16px;}
        .hero h1 em{font-style:normal;background:linear-gradient(135deg,#818cf8 0%,#c084fc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .hero p{font-size:15px;color:rgba(255,255,255,0.4);max-width:500px;margin:0 auto;line-height:1.7;}
        /* controls */
        .controls{display:none;}
        .stats-pill{display:none;}
        /* category tags — inline below subtitle */
        .cat-filter{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:24px;}
        .cat-btn{padding:6px 14px;border-radius:100px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;white-space:nowrap;}
        .cat-btn:hover{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.8);}
        .cat-btn.active{background:rgba(129,140,248,0.15);border-color:rgba(129,140,248,0.4);color:#818cf8;}
        /* floating search bar */
        .float-bar{
            position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
            z-index:100;
            display:flex;align-items:center;gap:10px;
            background:rgba(7,8,15,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.12);border-radius:100px;
            padding:10px 18px;
            width:auto;max-width:360px;
            box-shadow:0 8px 32px rgba(0,0,0,0.5);
        }
        .float-bar svg{color:rgba(255,255,255,0.3);flex-shrink:0;}
        .float-bar input{
            flex:1;min-width:0;background:transparent;border:none;outline:none;
            font-size:13px;color:#fff;font-family:'Inter',sans-serif;
        }
        .float-bar input::placeholder{color:rgba(255,255,255,0.3);}
        .float-bar .pill-count{
            font-size:11px;color:rgba(255,255,255,0.3);white-space:nowrap;
            padding:3px 10px;border-radius:100px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
        }
        .float-bar .pill-count strong{color:rgba(255,255,255,0.7);}
        @media(max-width:600px){
            .float-bar{bottom:16px;max-width:calc(100vw - 48px);}
        }
        /* section */
        .section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-bottom:14px;margin-top:44px;display:flex;align-items:center;gap:10px;}
        .section-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06);}
        /* grid */
        .demo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
        .demo-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:22px 14px 14px;display:flex;flex-direction:column;align-items:center;gap:14px;min-height:170px;justify-content:center;transition:border-color 0.2s;position:relative;}
        .demo-card:hover{border-color:rgba(255,255,255,0.14);}
        .demo-label{font-size:10px;color:rgba(255,255,255,0.22);font-weight:600;letter-spacing:0.4px;text-align:center;text-transform:uppercase;}
        .btn{padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);cursor:pointer;font-size:10px;font-weight:600;color:rgba(255,255,255,0.4);transition:all 0.2s;font-family:'Inter',sans-serif;}
        .btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
        .copy-btn{padding:5px 10px;border-radius:6px;border:1px solid rgba(129,140,248,0.2);background:rgba(129,140,248,0.08);cursor:pointer;font-size:10px;font-weight:600;color:rgba(129,140,248,0.7);transition:all 0.2s;font-family:'Inter',sans-serif;}
        .copy-btn:hover{background:rgba(129,140,248,0.18);color:#818cf8;}
        .copy-btn.copied{background:rgba(52,211,153,0.12);border-color:rgba(52,211,153,0.3);color:#34d399;}
        .card-btns{display:flex;gap:5px;}
        /* shapes */
        .box{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#818cf8,#c084fc);will-change:transform,opacity;}
        .box.amber{background:linear-gradient(135deg,#fbbf24,#fb923c);}
        .box.green{background:linear-gradient(135deg,#34d399,#22d3ee);}
        .box.rose{background:linear-gradient(135deg,#fb7185,#f472b6);}
        .box.sky{background:linear-gradient(135deg,#38bdf8,#818cf8);}
        .box.white{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);}
        .box.teal{background:linear-gradient(135deg,#2dd4bf,#34d399);}
        .box.orange{background:linear-gradient(135deg,#fb923c,#fbbf24);}
        .circle{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#34d399,#22d3ee);will-change:transform,opacity;}
        .circle.purple{background:linear-gradient(135deg,#818cf8,#c084fc);}
        .circle.rose{background:linear-gradient(135deg,#fb7185,#f472b6);}
        .circle.amber{background:linear-gradient(135deg,#fbbf24,#fb923c);}
        .circle.sky{background:linear-gradient(135deg,#38bdf8,#818cf8);}
        .ring{width:48px;height:48px;border-radius:50%;border:3px solid #818cf8;will-change:transform,opacity;}
        .ring.green{border-color:#34d399;}
        .ring.rose{border-color:#fb7185;}
        .ring.amber{border-color:#fbbf24;}
        .ring.sky{border-color:#38bdf8;}
        .ring.white{border-color:rgba(255,255,255,0.4);}
        .pill{height:36px;border-radius:100px;background:linear-gradient(135deg,#818cf8,#c084fc);will-change:transform;}
        .pill.rose{background:linear-gradient(135deg,#fb7185,#f472b6);}
        .pill.green{background:linear-gradient(135deg,#34d399,#22d3ee);}
        .pill.amber{background:linear-gradient(135deg,#fbbf24,#fb923c);}
        .bar-wrap{display:flex;flex-direction:column;gap:6px;width:100%;}
        .bar{height:6px;border-radius:100px;background:linear-gradient(90deg,#818cf8,#c084fc);will-change:width;}
        .bar.green{background:linear-gradient(90deg,#34d399,#22d3ee);}
        .bar.amber{background:linear-gradient(90deg,#fbbf24,#fb923c);}
        .bar.rose{background:linear-gradient(90deg,#fb7185,#f472b6);}
        .bar.sky{background:linear-gradient(90deg,#38bdf8,#818cf8);}
        .dot-row{display:flex;gap:8px;align-items:center;}
        .dot{width:12px;height:12px;border-radius:50%;background:#818cf8;will-change:transform,opacity;}
        .dot.green{background:#34d399;}
        .dot.rose{background:#fb7185;}
        .dot.amber{background:#fbbf24;}
        .dot.sky{background:#38bdf8;}
        .dot.white{background:rgba(255,255,255,0.5);}
        .text-demo{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:800;color:#fff;letter-spacing:-1px;will-change:transform,opacity;}
        .text-sm{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,0.5);will-change:transform,opacity;}
        .card-demo{width:110px;height:70px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);will-change:transform,opacity;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);}
        .progress-wrap{width:100%;height:7px;background:rgba(255,255,255,0.07);border-radius:100px;overflow:hidden;}
        .progress-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#818cf8,#c084fc);width:0%;will-change:width;}
        .counter{font-family:'Plus Jakarta Sans',sans-serif;font-size:42px;font-weight:800;color:#fff;letter-spacing:-2px;}
        .grid-dots{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
        .grid-dot{width:11px;height:11px;border-radius:3px;background:rgba(129,140,248,0.3);will-change:transform,opacity;}
        .hline{width:100%;height:2px;border-radius:2px;background:linear-gradient(90deg,#818cf8,#c084fc);will-change:transform,opacity;}
        .hline.green{background:linear-gradient(90deg,#34d399,#22d3ee);}
        .hline.rose{background:linear-gradient(90deg,#fb7185,#f472b6);}
        .hline.amber{background:linear-gradient(90deg,#fbbf24,#fb923c);}
        .hline.white{background:rgba(255,255,255,0.3);}
        .vline{width:2px;height:60px;border-radius:2px;background:linear-gradient(180deg,#818cf8,#c084fc);will-change:transform,opacity;}
        .vline.green{background:linear-gradient(180deg,#34d399,#22d3ee);}
        .vline.rose{background:linear-gradient(180deg,#fb7185,#f472b6);}
        .badge-demo{padding:5px 12px;border-radius:100px;background:rgba(129,140,248,0.15);border:1px solid rgba(129,140,248,0.3);font-size:11px;font-weight:600;color:#818cf8;will-change:transform,opacity;}
        .badge-demo.green{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.3);color:#34d399;}
        .badge-demo.rose{background:rgba(251,113,133,0.15);border-color:rgba(251,113,133,0.3);color:#fb7185;}
        .avatar-stack{display:flex;}
        .avatar{width:32px;height:32px;border-radius:50%;border:2px solid #07080f;margin-left:-8px;will-change:transform,opacity;}
        .avatar:first-child{margin-left:0;}
        .avatar.a{background:linear-gradient(135deg,#818cf8,#c084fc);}
        .avatar.b{background:linear-gradient(135deg,#34d399,#22d3ee);}
        .avatar.c{background:linear-gradient(135deg,#fb7185,#f472b6);}
        .avatar.d{background:linear-gradient(135deg,#fbbf24,#fb923c);}
        .avatar.e{background:linear-gradient(135deg,#38bdf8,#818cf8);}
        .toggle{width:44px;height:24px;border-radius:100px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);position:relative;cursor:pointer;}
        .toggle-knob{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;left:3px;will-change:transform;}
        .notification{width:100%;padding:9px 12px;border-radius:9px;background:rgba(129,140,248,0.1);border:1px solid rgba(129,140,248,0.2);font-size:10px;color:rgba(255,255,255,0.6);will-change:transform,opacity;}
        .skeleton{width:100%;height:10px;border-radius:5px;background:rgba(255,255,255,0.07);overflow:hidden;position:relative;}
        .skeleton::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);transform:translateX(-100%);}
        /* SVG canvas for lines/arrows/paths */
        .svg-demo{width:100%;height:80px;}
        /* load more */
        #load-more-sentinel{text-align:center;padding:24px;font-size:11px;color:rgba(255,255,255,0.2);}
        #toast{position:fixed;bottom:24px;right:24px;background:rgba(15,23,42,0.95);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transform:translateY(10px);transition:all 0.3s ease;pointer-events:none;z-index:100;}
        .toast-show{opacity:1!important;transform:translateY(0)!important;}
        .empty{text-align:center;padding:80px 20px;color:rgba(255,255,255,0.2);font-size:14px;}
        @media(max-width:600px){.demo-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}.content{padding:40px 4% 80px;}input[type="text"]{width:200px;}}
    
        .nav-github-mobile{display:none;}
        @media(min-width:641px){
          .nav-right{display:flex !important;}
        }
        @media(max-width:640px){
          .nav-right{display:none !important;}
          .nav-github-mobile{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.75);text-decoration:none;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;transition:all 0.2s;}
        }
    </style>
</head>

<style>
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes spin-reverse{to{transform:rotate(-360deg);}}
@keyframes spin-slow{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.88);}}
@keyframes pulse-ring{0%{transform:scale(1);opacity:1;}100%{transform:scale(1.8);opacity:0;}}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-18px);}}

<script>
// ─── RENDER ENGINE ────────────────────────────────────────────────────────────
let activeCat = 'All';
let currentQuery = '';
let currentList = [];
let renderedCount = 0;
const PAGE_SIZE = 60;

function buildCatFilter() {
  const cats = ['All', ...new Set(MOTIONS.map(m => m.cat))];
  const wrap = document.getElementById('catFilter');
  wrap.innerHTML = cats.map(c =>
    `<button class="cat-btn${c === activeCat ? ' active' : ''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}

window.setCat = function(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.textContent === cat));
  applyFilters();
};

function applyFilters(q) {
  if (q !== undefined) currentQuery = q.toLowerCase().trim();
  let list = MOTIONS;
  if (activeCat !== 'All') list = list.filter(m => m.cat === activeCat);
  if (currentQuery) list = list.filter(m =>
    m.name.toLowerCase().includes(currentQuery) || m.cat.toLowerCase().includes(currentQuery) || m.id.toLowerCase().includes(currentQuery)
  );
  renderGrid(list);
}

function renderGrid(list) {
  currentList = list;
  renderedCount = 0;
  const container = document.getElementById('motionContainer');
  document.getElementById('countLabel').textContent = list.length;
  if (!list.length) { container.innerHTML = '<div class="empty">No motions match your search.</div>'; return; }
  container.innerHTML = '<div id="cards-wrap"></div>';
  renderNextPage();
  observeSentinel();
}

function renderNextPage() {
  if (renderedCount >= currentList.length) {
    document.getElementById('load-more-sentinel').style.display = 'none';
    return;
  }
  const wrap = document.getElementById('cards-wrap');
  const slice = currentList.slice(renderedCount, renderedCount + PAGE_SIZE);
  renderedCount += slice.length;

  const cats = [...new Set(slice.map(m => m.cat))];
  cats.forEach(cat => {
    let section = wrap.querySelector(`[data-cat="${cat}"]`);
    if (!section) {
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = cat;
      wrap.appendChild(label);
      section = document.createElement('div');
      section.className = 'demo-grid';
      section.dataset.cat = cat;
      wrap.appendChild(section);
    }
    slice.filter(m => m.cat === cat).forEach(m => {
      const card = document.createElement('div');
      card.className = 'demo-card';
      const replayBtn = m.replay ? `<button class="btn" onclick="${m.replay}">Replay</button>` : '';
      card.innerHTML = `
        ${m.html}
        <div class="demo-label">${m.name}</div>
        <div class="card-btns">
          ${replayBtn}
          <button class="copy-btn" onclick="copyCSS('${m.id}',this)">Copy CSS</button>
        </div>`;
      section.appendChild(card);
    });
  });

  const remaining = currentList.length - renderedCount;
  const sentinel = document.getElementById('load-more-sentinel');
  if (remaining > 0) {
    sentinel.style.display = 'block';
    sentinel.textContent = `Showing ${renderedCount} of ${currentList.length} — scroll for more`;
  } else {
    sentinel.style.display = 'none';
  }
}

let observer;
function observeSentinel() {
  if (observer) observer.disconnect();
  observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) renderNextPage();
  }, { rootMargin: '400px' });
  const s = document.getElementById('load-more-sentinel');
  if (s) observer.observe(s);
}

let copyTimer;
function copyCSS(id, btn) {
  const m = MOTIONS.find(x => x.id === id);
  if (!m) return;
  // Copy only the CSS
  const fullCode = `/* ${m.name} */\n${m.css}`;
  function onCopied() {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    clearTimeout(copyTimer);
    copyTimer = setTimeout(() => { btn.textContent = 'Copy CSS'; btn.classList.remove('copied'); }, 1600);
    showToast('Copied!');
  }
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(fullCode).then(onCopied).catch(() => fallbackCopy(fullCode, onCopied));
  } else {
    fallbackCopy(fullCode, onCopied);
  }
}
function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {}
  document.body.removeChild(ta);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('toast-show');
  setTimeout(() => t.classList.remove('toast-show'), 2000);
}

<script>
(function(){

    const d = Math.min(devicePixelRatio, 2);

  }
  window.addEventListener('resize', resize);

  const vs = `attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
  const fs = `precision highp float;uniform float t;uniform vec2 r;uniform vec2 m;float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}float ray(vec2 src,vec2 dir,vec2 c,float a,float b,float s){vec2 d=c-src;vec2 dn=normalize(d);float ca=dot(dn,dir);float sp=pow(max(ca,0.),6.);float dist=length(d);float f=clamp((r.x*2.-dist)/(r.x*2.),0.,1.);float pulse=.7+.3*sin(t*s+ca*a);float base=clamp(.45+.15*sin(ca*a+t*s)+.3+.2*cos(-ca*b+t*s),0.,1.);return base*f*sp*pulse;}void main(){vec2 c=vec2(gl_FragCoord.x,r.y-gl_FragCoord.y);vec2 src=vec2(r.x*(.5+(m.x-.5)*.12),-r.y*.04);vec2 dir=normalize(vec2((m.x-.5)*.18,1.));float rays=ray(src,dir,c,36.22,21.11,1.5)*.55+ray(src,dir,c,22.4,18.02,1.1)*.4;vec3 col=rays*vec3(.55,.52,1.);col*=.15+(1.-c.y/r.y)*.85;float star=0.;for(int i=0;i<3;i++){vec2 cell=floor(c/(80.+float(i)*40.));vec2 h2=vec2(h(cell+float(i)*7.3),h(cell+float(i)*13.7));vec2 sp=(cell+h2)*(80.+float(i)*40.);float d=length(c-sp);float tw=.5+.5*sin(t*(1.5+h2.x*3.)+h2.y*6.28);star+=tw*smoothstep(1.8,0.,d)*(.3+h2.x*.7);}col+=star*vec3(.85,.88,1.)*.6;gl_FragColor=vec4(col,rays*.92+star*.5);}`;
  function sh(type, src) { const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s; }
  const prog = gl.createProgram();
  gl.attachShader(prog, sh(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog); gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,3,-1,-1,3]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, 'p');
